<!doctype html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="x-apple-disable-message-reformatting">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<title>{{subject}}</title>
<!--[if mso]>
<style type="text/css">
table, td, div, h1, p, a { font-family: Arial, sans-serif !important; }
</style>
<![endif]-->
<style>
  @media (prefers-color-scheme: dark) {
    .bg           { background-color: #0a0908 !important; }
    .card         { background-color: #161412 !important; border-color: #2a2624 !important; }
    .text         { color: #f5f0ec !important; }
    .muted        { color: #a89d94 !important; }
    .divider      { border-color: #2a2624 !important; }
  }
  @media only screen and (max-width: 620px) {
    .container { width: 100% !important; padding: 24px 18px !important; }
    .card      { padding: 28px 22px !important; }
    .btn       { width: 100% !important; display: block !important; }
  }
  a { text-decoration: none; }
</style>
</head>
<body class="bg" style="margin:0; padding:0; background-color:#f5f5f4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; -webkit-font-smoothing:antialiased;">
  <!-- preheader oculto (snippet de preview en gmail) -->
  <div style="display:none; font-size:1px; color:#f5f5f4; line-height:1px; max-height:0px; max-width:0px; opacity:0; overflow:hidden;">
    {{preheader}}
  </div>

  <table class="bg" role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#f5f5f4;">
    <tr>
      <td align="center" style="padding: 32px 16px;">
        <table class="container" role="presentation" cellspacing="0" cellpadding="0" border="0" width="560" style="width:560px; max-width:100%;">
          <!-- header -->
          <tr>
            <td align="center" style="padding: 0 0 20px 0;">
              <a href="{{app_url}}" style="display:inline-block;">
                <img src="{{logo_url}}" alt="{{app_name}}" width="56" height="56" style="display:block; border:0; border-radius:12px;">
              </a>
            </td>
          </tr>

          <!-- card -->
          <tr>
            <td class="card" style="background-color:#ffffff; border:1px solid #e7e5e4; border-radius:16px; padding:40px 36px;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td class="text" style="color:#1c1917; font-size:22px; font-weight:600; line-height:1.25; letter-spacing:-0.01em; padding:0 0 12px 0;">
                    {{title}}
                  </td>
                </tr>
                <tr>
                  <td class="muted" style="color:#57534e; font-size:15px; line-height:1.55; padding:0 0 8px 0;">
                    {{body}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- footer -->
          <tr>
            <td align="center" style="padding: 24px 8px 0 8px;">
              <p class="muted" style="color:#78716c; font-size:12px; line-height:1.5; margin:0 0 6px 0;">
                Este correo fue enviado por {{app_name}}.
              </p>
              <p class="muted" style="color:#a8a29e; font-size:12px; line-height:1.5; margin:0;">
                ¿No fuiste tú? Ignora este mensaje y no se hará ningún cambio.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>

<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Cambia estas rutas desde src/config/brand.ts · faviconPath -->
    <link rel="icon" type="image/png" href="/logos/ilabtdi-logo.png" />
    <link rel="apple-touch-icon" href="/logos/ilabtdi-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0908" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="iLab TDI — plataforma base del laboratorio" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Fallback: Onest (geométrica moderna, muy cercana a Garet).
      Cuando agregues los .woff2 de Garet en /public/fonts/, Garet
      toma precedencia vía la cascada de font-family.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800&display=swap"
    />

    <title>iLab TDI</title>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>Esta aplicación requiere JavaScript activado para funcionar.</noscript>
  </body>
</html>

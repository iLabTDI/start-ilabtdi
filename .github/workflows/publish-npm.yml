# ─────────────────────────────────────────────────────────────
# Publica create-ilabtdi a npm automáticamente en cada push a main
# que toque `packages/create-ilabtdi/`.
#
# Flujo:
#   1. Si la versión en package.json ya existe en npm → bump patch
#   2. Publica con NPM_TOKEN (token con 2FA bypass)
#   3. Si hubo bump, empuja el commit del bump al repo (con [skip ci])
#
# Requiere secret: NPM_TOKEN
#   Crea un Granular Access Token en https://www.npmjs.com/settings/~/tokens
#   con "Allow 2FA bypass" marcado · scope: create-ilabtdi · Read and write.
# ─────────────────────────────────────────────────────────────

name: Publish · create-ilabtdi

on:
  push:
    branches: [main]
    paths:
      - 'packages/create-ilabtdi/**'
  workflow_dispatch:

concurrency:
  group: publish-create-ilabtdi
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-token:
    name: Verificar NPM_TOKEN
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::notice title=Publish saltado::Falta NPM_TOKEN. Configúralo en Settings → Secrets."
            echo "### ⏭ Publicación saltada" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Falta el secret **NPM_TOKEN** en el repo. Para configurarlo:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "1. Ve a [npmjs.com/settings/~/tokens](https://www.npmjs.com/settings/~/tokens)" >> $GITHUB_STEP_SUMMARY
            echo "2. **Generate New Token → Granular Access Token**" >> $GITHUB_STEP_SUMMARY
            echo "3. Marca **\"Allow 2FA bypass\"**" >> $GITHUB_STEP_SUMMARY
            echo "4. Scope: solo \`create-ilabtdi\` · Permissions: Read and write" >> $GITHUB_STEP_SUMMARY
            echo "5. Copia el token y agrégalo en **Repo → Settings → Secrets and variables → Actions → New secret** como \`NPM_TOKEN\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Bump y publish
    needs: check-token
    if: needs.check-token.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Comparar versión local vs publicada
        id: version
        working-directory: packages/create-ilabtdi
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view create-ilabtdi version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "remote=$REMOTE" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "action=bump-and-publish" >> $GITHUB_OUTPUT
            echo "::notice::Versión $LOCAL ya publicada · bumpeando patch antes de publicar."
          else
            echo "action=publish" >> $GITHUB_OUTPUT
            echo "::notice::Publicando versión $LOCAL (npm está en $REMOTE)."
          fi

      - name: Bump patch (si ya existe la versión)
        if: steps.version.outputs.action == 'bump-and-publish'
        working-directory: packages/create-ilabtdi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV
          # Commit + push del bump (con [skip ci] para no re-trigger)
          git add package.json
          git commit -m "chore(create-ilabtdi): bump to $NEW_VERSION [skip ci]"
          git push origin main

      - name: Publish a npm
        working-directory: packages/create-ilabtdi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Resumen
        working-directory: packages/create-ilabtdi
        run: |
          FINAL=$(node -p "require('./package.json').version")
          echo "### ✅ create-ilabtdi@$FINAL publicado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pnpm create ilabtdi@latest mi-proyecto" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

# Configuración de `supabase start` para desarrollo local.
# Referencia: https://supabase.com/docs/guides/local-development/cli/config

project_id = "start-ilabtdi"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "http://localhost:5173/reset-password"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 10
password_requirements = "lower_upper_letters_digits_symbols"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

[auth.rate_limit]
email_sent = 2
sign_in_sign_ups = 10
token_refresh = 30

[storage]
enabled = true
file_size_limit = "5MiB"

[inbucket]
enabled = true
port = 54324

[analytics]
enabled = false
